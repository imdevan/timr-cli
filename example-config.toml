# General
editor = "nvim"
default_units = "minutes"
# default_timer = "25m"                        # default timer duration when run with no arguments
# pomodoro = [25, 5, 25, 5, 25, 20]            # sequence of minutes for pomodoro command

# [pomodoro_messages]
# after_first_work = ["You're off to a great start!", "One small timer, one big step!"]
# after_first_break = "You got this!"
# after_second_work = ["Hell yeah!", "Nice job!"]
# after_second_break = ""
# before_last_work = "You're almost there!"
# after_last_work = "You did it!"
# after_last_break = "You freaking rock!"
# alarm_sound = "/path/to/alarm.mp3"         # single file
# alarm_sound = "~/Music/alarms/"            # random file from directory
# alarm_sound = "/a.mp3, /b.mp3, ~/Music/"   # comma-separated list, picks random

# CLI behavior
interactive_default = true
update_tmux_window = false
tmux_progress_bar = true
tmux_inverted = false
full_width = true
full_tui = true
# vertical = false                             # render progress bar vertically
# rainbow = true  # true, false, or array of custom colors: ["#f5bde6", "#c6a0f6", "#ed8796"]

# UI
# list_spacing options: compact (title only), tight (title + description, no margin), space (default, with spacing)
list_spacing = "space"

# Colors
# Colors support named, numeric, or hex values (ex: 7, 13, "#ff8800").
time_remaining = "14"
time_start = "07"
bar_bg = "08"
bar_fg = ["02", "03", "01"]  # single color or array of colors (up to 10) for progress bar subdivisions
help_text = "08"
border = "08"
